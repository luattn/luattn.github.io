<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://luattn.github.io/styles.css">
</head>

<body>
    <h3 id="datalist">To be updated...</h3>
    <label for="myBrowser">Choose a browser from this list:</label>
    <input list="browsers" id="myBrowser" name="myBrowser" placeholder="Type to search..."/>
    <datalist id="browsers">
        <option value="Chrome"></option>
        <option value="Firefox"></option>
        <option value="Safari"></option>
        <option value="Edge"></option>
    </datalist>
    <br><br><br>
    <h3 id="flexbox">Responsive Flexbox Example</h3>
    <div class="flexbox">
        <div class="item">Chrome</div>
        <div class="item">Firefox</div>
        <div class="item">Safari</div>
        <div class="item">Edge</div>
    </div>
</body>

</html>
